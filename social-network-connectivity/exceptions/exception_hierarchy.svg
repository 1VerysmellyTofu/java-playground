  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Tree rooted at Exception, branching to RuntimeException and IOException. RuntimeException leads to IndexOutOfBoundsException, IllegalArgumentException, and NoSuchElementException. IOException leads to FileNotFoundException. Leaf exceptions are ArrayIndexOutOfBoundsException, NumberFormatException, InputMismatchException, FileNotFoundException.</desc>
