<svg width="100%" viewBox="0 0 800 500" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Java exception hierarchy (exceptions only)</title>
  <desc>Tree rooted at Exception, branching to RuntimeException and IOException. RuntimeException leads to IndexOutOfBoundsException, IllegalArgumentException, and NoSuchElementException. IOException leads to FileNotFoundException. Leaf exceptions are ArrayIndexOutOfBoundsException, NumberFormatException, InputMismatchException, FileNotFoundException.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <symbol id="box-beige" viewBox="0 0 100 44" preserveAspectRatio="none">
      <rect width="100" height="44" rx="8" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
    </symbol>
    <symbol id="box-purple" viewBox="0 0 100 44" preserveAspectRatio="none">
      <rect width="100" height="44" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
    </symbol>
    <symbol id="box-green" viewBox="0 0 100 44" preserveAspectRatio="none">
      <rect width="100" height="44" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
    </symbol>
  </defs>

  <use href="#box-beige"  x="240" y="20"  width="160" height="44"/>
  <use href="#box-purple" x="90"  y="120" width="190" height="44"/>
  <use href="#box-green"  x="590" y="120" width="150" height="44"/>
  <use href="#box-purple" x="10"  y="230" width="175" height="44"/>
  <use href="#box-purple" x="195" y="230" width="175" height="44"/>
  <use href="#box-purple" x="380" y="230" width="155" height="44"/>
  <use href="#box-purple" x="10"  y="350" width="175" height="44"/>
  <use href="#box-purple" x="195" y="350" width="175" height="44"/>
  <use href="#box-purple" x="380" y="350" width="155" height="44"/>
  <use href="#box-green"  x="590" y="350" width="150" height="44"/>

  <g font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="central">
    <g fill="rgb(68,68,65)">
      <text x="320" y="43">Exception</text>
    </g>
    <g fill="rgb(60,52,137)">
      <text x="185" y="143">RuntimeException</text>
      <text x="97"  y="245">IndexOutOfBounds</text>
      <text x="97"  y="263">Exception</text>
      <text x="282" y="245">IllegalArgument</text>
      <text x="282" y="263">Exception</text>
      <text x="457" y="245">NoSuchElement</text>
      <text x="457" y="263">Exception</text>
      <text x="97"  y="365">ArrayIndexOutOf</text>
      <text x="97"  y="383">BoundsException</text>
      <text x="282" y="365">NumberFormat</text>
      <text x="282" y="383">Exception</text>
      <text x="457" y="365">InputMismatch</text>
      <text x="457" y="383">Exception</text>
    </g>
    <g fill="rgb(8,80,65)">
      <text x="665" y="143">IOException</text>
      <text x="665" y="365">FileNotFound</text>
      <text x="665" y="383">Exception</text>
    </g>
  </g>

  <g fill="none" stroke="gray" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arrow)">
    <line x1="295" y1="64"  x2="230" y2="120"/>
    <line x1="345" y1="64"  x2="610" y2="120"/>
    <line x1="155" y1="164" x2="110" y2="230"/>
    <line x1="185" y1="164" x2="260" y2="230"/>
    <line x1="230" y1="164" x2="400" y2="230"/>
    <line x1="97"  y1="274" x2="97"  y2="350"/>
    <line x1="282" y1="274" x2="282" y2="350"/>
    <line x1="457" y1="274" x2="457" y2="350"/>
    <line x1="665" y1="164" x2="665" y2="350"/>
  </g>
</svg>
